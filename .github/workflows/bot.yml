name: bot-runtime

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: bot-runtime-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run:
    name: runtime tick loop (push)
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Runtime tick loop
        env:
          DRY_RUN: "false"
          ODDS_API_KEY_1: ${{ secrets.ODDS_API_KEY_1 }}
          ODDS_API_KEY_2: ${{ secrets.ODDS_API_KEY_2 }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          END=$((SECONDS+3000))
          while :; do
            python src/sports_prediction.py push || true
            for f in flags.json weekly_games.json key_state.json predictions.json verified_history.csv; do
              [ -f "$f" ] && git add "$f" || true
            done
            if ! git diff --staged --quiet; then
              git commit -m "[skip ci] update bot state" || true
              git pull --rebase --autostash || true
              git push || true
            fi
            [ $SECONDS -ge $END ] && break
            sleep 300
          done
